services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: mechify
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mechify_secret}
      POSTGRES_DB: mechify
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mechify"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://mechify:${DB_PASSWORD:-mechify_secret}@db:5432/mechify
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_this_in_production}
      NEXTAUTH_URL: http://localhost:3000
    volumes:
      - ${DATA_PATH:-./data}/uploads:/app/public/uploads
      - ${DATA_PATH:-./data}/backups:/app/backups
    ports:
      - "3000:3000"
